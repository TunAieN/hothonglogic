"A datetime string with format `Y-m-d H:i:s`"
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

type Customer {
    id: ID!
    code: String!
    name: String!
    phone: String!
    email: String
    address: String
    note: String
    status: String!
    orders: [Order!]! @hasMany
    created_at: DateTime
    updated_at: DateTime
}

type Order {
    id: ID!
    order_code: String!
    status: String!
    total_amount: Float!
    note: String
    customer: Customer! @belongsTo
    items: [OrderItem!]! @hasMany
    created_at: DateTime
    updated_at: DateTime
}

type OrderItem {
    id: ID!
    product_name: String!
    product_link: String
    price_cny: Float!
    quantity: Int!
    note: String
    product_image: String
    created_at: DateTime
}

type DeleteCustomerResponse {
    success: Boolean!
    message: String!
}

type Query {
    "Lấy danh sách khách hàng, lọc theo status và tìm theo keyword"
    customers(status: String, search: String): [Customer!]!
        @field(resolver: "App\\GraphQL\\Queries\\CustomersQuery")

    "Lấy thông tin một khách hàng theo ID"
    customer(id: ID! @eq): Customer @find

    "Lấy danh sách đơn hàng (kèm customer và items)"
    orders: [Order!]!
        @field(resolver: "App\\GraphQL\\Queries\\OrdersQuery")

    "Lấy chi tiết một đơn hàng"
    order(id: ID! @eq): Order @find
}

type Mutation {
    "Tạo khách hàng mới"
    createCustomer(
        code: String!
        name: String!
        phone: String!
        email: String
        address: String
        note: String
        status: String
    ): Customer!
        @field(resolver: "App\\GraphQL\\Mutations\\CreateCustomer")

    "Cập nhật thông tin khách hàng"
    updateCustomer(
        id: ID!
        code: String
        name: String
        phone: String
        email: String
        address: String
        note: String
        status: String
    ): Customer!
        @field(resolver: "App\\GraphQL\\Mutations\\UpdateCustomer")

    "Xóa khách hàng (chỉ khi chưa có đơn hàng)"
    deleteCustomer(id: ID!): DeleteCustomerResponse!
        @field(resolver: "App\\GraphQL\\Mutations\\DeleteCustomer")

    "Tạo đơn hàng mới kèm danh sách sản phẩm"
    createOrder(
        customer_id: ID!
        note: String
        items: [OrderItemInput!]!
    ): Order!
        @field(resolver: "App\\GraphQL\\Mutations\\CreateOrder")
}

input OrderItemInput {
    product_name: String!
    product_link: String
    price_cny: Float!
    quantity: Int!
    note: String
    product_image: String
}
